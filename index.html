<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="description" content="Dr. Vinay Kumar Singh 정형외과 수술 술기 영상 라이브러리 - 246개 영상을 카테고리별로 정렬" />
<meta name="theme-color" content="#0a0a0c" />
<title>싱튜브 · Dr. Vinay Kumar Singh — 정형외과 술기 라이브러리</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0:#0a0a0c; --bg-1:#111114; --bg-2:#16161a; --bg-3:#1c1c22;
    --bg-hover:#1f1f26; --border:#25252c; --border-soft:#1d1d23;
    --text-1:#f4f4f6; --text-2:#b6b6bf; --text-3:#76767f; --text-4:#4a4a52;
    --accent:#ff5d5d; --accent-soft:rgba(255,93,93,0.12);
    --gold:#ffc857; --gold-soft:rgba(255,200,87,0.14);
    --watched:#5fbf72; --watched-soft:rgba(95,191,114,0.13);
    --shadow-2:0 8px 40px rgba(0,0,0,.55);
    --r-sm:8px; --r-md:12px; --r-lg:16px;
    --header-h:60px; --sidebar-w:300px;
  }
  * { box-sizing:border-box; margin:0; padding:0 }
  html, body {
    height:100%; background:var(--bg-0); color:var(--text-1);
    font-family:'Pretendard','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  a { color:inherit; text-decoration:none }
  button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit }
  input { font-family:inherit }

  .app {
    display:grid;
    grid-template-rows: var(--header-h) 1fr;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-areas:"header header" "sidebar main";
    height:100vh;
  }
  .header { grid-area:header }
  .sidebar { grid-area:sidebar }
  .main { grid-area:main }

  .header {
    display:flex; align-items:center; gap:16px; padding:0 20px;
    background:rgba(10,10,12,.85);
    backdrop-filter:saturate(160%) blur(14px);
    -webkit-backdrop-filter:saturate(160%) blur(14px);
    border-bottom:1px solid var(--border-soft); z-index:30;
  }
  .brand { display:flex; align-items:center; gap:10px; font-weight:700; font-size:15px; letter-spacing:-0.01em; white-space:nowrap }
  .brand .dot {
    width:24px; height:24px; border-radius:6px;
    background:linear-gradient(135deg,var(--accent),#ff8a5d);
    display:inline-flex; align-items:center; justify-content:center;
    color:#fff; font-size:12px; font-weight:800;
  }
  .brand .sub { color:var(--text-3); font-weight:500; font-size:13px }
  .search { flex:1; max-width:520px; margin:0 auto; position:relative }
  .search input {
    width:100%; height:38px; padding:0 14px 0 38px;
    background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r-md);
    color:var(--text-1); font-size:13px; outline:none; transition:all .15s ease;
  }
  .search input::placeholder { color:var(--text-3) }
  .search input:focus { border-color:var(--accent); background:var(--bg-3); box-shadow:0 0 0 3px var(--accent-soft) }
  .search svg.icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--text-3) }

  .sort-wrap { display:flex; gap:6px; align-items:center }
  .sort-btn {
    padding:7px 12px; border-radius:8px; background:var(--bg-2);
    border:1px solid var(--border); color:var(--text-2); font-size:12.5px; font-weight:500;
    transition:all .15s ease;
  }
  .sort-btn:hover { background:var(--bg-3); color:var(--text-1) }
  .sort-btn.active { background:var(--accent-soft); border-color:rgba(255,93,93,.35); color:#ffa3a3 }

  .auth-chip {
    display:flex; align-items:center; gap:8px;
    padding:6px 12px; border-radius:999px;
    background:var(--bg-2); border:1px solid var(--border);
    color:var(--text-2); font-size:12px; font-weight:500;
    cursor:pointer; transition:all .15s ease;
  }
  .auth-chip:hover { color:var(--text-1); background:var(--bg-3) }
  .auth-chip .av {
    width:22px; height:22px; border-radius:50%;
    background:linear-gradient(135deg,#6e8cff,#a36eff);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:11px; font-weight:700;
  }
  .auth-chip.online .av { background:linear-gradient(135deg,#5fbf72,#3aa84e) }
  .auth-chip .sync-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--watched); margin-left:2px;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .auth-chip.syncing .sync-dot { background:var(--gold) }
  .auth-chip.offline .sync-dot { background:var(--text-3); animation:none }
  @keyframes pulse {
    0%,100% { opacity:.4; transform:scale(.8) }
    50% { opacity:1; transform:scale(1.1) }
  }

  /* Sidebar */
  .sidebar {
    background:var(--bg-1); border-right:1px solid var(--border-soft);
    overflow-y:auto; padding:12px 0;
  }
  .sidebar::-webkit-scrollbar { width:8px }
  .sidebar::-webkit-scrollbar-track { background:transparent }
  .sidebar::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px }
  .sidebar::-webkit-scrollbar-thumb:hover { background:#2f2f37 }

  .nav-item {
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 14px 9px 18px; margin:1px 8px; border-radius:8px;
    color:var(--text-2); font-size:13px; cursor:pointer;
    transition:background .12s, color .12s; user-select:none;
  }
  .nav-item:hover { background:var(--bg-hover); color:var(--text-1) }
  .nav-item.active {
    background:var(--accent-soft); color:#ffb4b4; font-weight:600;
  }
  .nav-item.special {
    margin:4px 8px;
    background:var(--bg-2); color:var(--text-1); font-weight:600;
    border:1px solid var(--border-soft);
  }
  .nav-item.special.active { border-color:rgba(255,93,93,.35) }
  .nav-item.fav.active { background:var(--gold-soft); color:#ffd97a; border-color:rgba(255,200,87,.35) }
  .nav-item.watched.active { background:var(--watched-soft); color:#9be0ab; border-color:rgba(95,191,114,.35) }
  .nav-count {
    color:var(--text-3); font-size:11.5px;
    background:rgba(255,255,255,.04); padding:1px 7px; border-radius:999px;
    font-variant-numeric:tabular-nums; font-weight:500;
  }
  .nav-item.active .nav-count {
    background:rgba(255,93,93,.18); color:#ffb4b4;
  }
  .nav-item.fav.active .nav-count { background:var(--gold-soft); color:#ffd97a }
  .nav-item.watched.active .nav-count { background:var(--watched-soft); color:#9be0ab }

  .group { margin-top:10px }
  .group-header {
    display:flex; align-items:center; gap:8px;
    padding:8px 18px 6px 18px;
    color:var(--text-3); font-size:11px; font-weight:600;
    letter-spacing:.04em; text-transform:uppercase;
    cursor:pointer; user-select:none;
  }
  .group-header .chev { width:10px; height:10px; transition:transform .15s ease; color:var(--text-4) }
  .group.collapsed .chev { transform:rotate(-90deg) }
  .group.collapsed .group-body { display:none }

  .divider { height:1px; background:var(--border-soft); margin:10px 16px }

  /* Main */
  .main { overflow-y:auto; background:var(--bg-0) }
  .main::-webkit-scrollbar { width:10px }
  .main::-webkit-scrollbar-track { background:transparent }
  .main::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px }
  .main::-webkit-scrollbar-thumb:hover { background:#2f2f37 }

  .player-wrap {
    background:linear-gradient(180deg,var(--bg-1) 0%, var(--bg-0) 100%);
    border-bottom:1px solid var(--border-soft);
    padding:24px 32px 28px 32px;
  }
  .player-frame {
    width:100%; max-width:1100px; aspect-ratio:16/9;
    background:#000; border-radius:var(--r-lg); overflow:hidden;
    box-shadow:var(--shadow-2); margin:0 auto;
  }
  .player-frame iframe { width:100%; height:100%; border:0 }
  .player-empty {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px; color:var(--text-3);
    background:radial-gradient(ellipse at center,#18181f 0%,#0c0c10 70%);
  }
  .player-empty .play-icon {
    width:48px; height:48px; border-radius:50%;
    background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    color:#fff; box-shadow:0 0 30px var(--accent-soft);
  }
  .player-meta { max-width:1100px; margin:14px auto 0 auto; color:var(--text-2) }
  .player-meta .num-pill {
    display:inline-block; background:var(--accent); color:#fff;
    font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px;
    margin-right:8px; letter-spacing:.02em; vertical-align:middle;
  }
  .player-meta .ttl {
    color:var(--text-1); font-size:16px; font-weight:600;
    letter-spacing:-0.01em; line-height:1.4;
  }
  .player-meta .info {
    margin-top:10px; font-size:12.5px; color:var(--text-3);
    display:flex; gap:14px; flex-wrap:wrap; align-items:center;
  }
  .player-meta .yt-link { color:var(--accent); transition:opacity .15s }
  .player-meta .yt-link:hover { opacity:.85 }
  .player-meta .pact {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 12px; border-radius:8px;
    background:var(--bg-2); border:1px solid var(--border);
    color:var(--text-2); font-size:12.5px; font-weight:500;
    transition:all .15s; cursor:pointer;
  }
  .player-meta .pact:hover { color:var(--text-1); background:var(--bg-3) }
  .player-meta .pact.fav { color:var(--gold); border-color:rgba(255,200,87,.3); background:var(--gold-soft) }
  .player-meta .pact.watched { color:var(--watched); border-color:rgba(95,191,114,.3); background:var(--watched-soft) }

  /* List */
  .list-wrap { padding:18px 32px 60px 32px }
  .list-head {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px; gap:12px; flex-wrap:wrap;
  }
  .list-title { font-size:18px; font-weight:700; color:var(--text-1); letter-spacing:-0.01em }
  .list-title .topic-en { margin-left:10px; color:var(--text-3); font-size:13px; font-weight:500 }
  .list-title .icon { margin-right:6px; vertical-align:-2px }
  .list-count { color:var(--text-3); font-size:12.5px; font-variant-numeric:tabular-nums }

  .list { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px }
  .card {
    background:var(--bg-1); border:1px solid var(--border-soft);
    border-radius:var(--r-md); overflow:hidden; cursor:pointer;
    transition:transform .15s, border-color .15s, background .15s;
    display:flex; flex-direction:column; position:relative;
  }
  .card:hover { transform:translateY(-2px); border-color:#353541; background:var(--bg-2) }
  .card.playing {
    border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent),0 6px 24px rgba(255,93,93,.18);
  }
  .card.is-watched .thumb img { opacity:.55 }
  .card.is-watched .card-title { color:var(--text-2) }
  .thumb { width:100%; aspect-ratio:16/9; background:#000; position:relative; overflow:hidden }
  .thumb img {
    width:100%; height:100%; object-fit:cover; display:block;
    transition:transform .4s ease, opacity .15s ease;
  }
  .card:hover .thumb img { transform:scale(1.04) }
  .thumb .num-badge {
    position:absolute; top:8px; left:8px;
    background:rgba(0,0,0,.78); backdrop-filter:blur(4px);
    color:#fff; font-size:11px; font-weight:700;
    padding:3px 8px; border-radius:5px; letter-spacing:.03em;
  }
  .thumb .duration {
    position:absolute; bottom:8px; right:8px;
    background:rgba(0,0,0,.85); color:#fff;
    font-size:11px; font-weight:600; padding:2px 6px;
    border-radius:4px; font-variant-numeric:tabular-nums;
  }
  .thumb .watched-mark {
    position:absolute; top:8px; right:42px;
    background:var(--watched); color:#fff;
    font-size:10px; font-weight:700;
    padding:2px 7px; border-radius:999px;
    box-shadow:0 2px 8px rgba(0,0,0,.4);
    display:none;
  }
  .card.is-watched .watched-mark { display:inline-block }
  .fav-btn {
    position:absolute; top:6px; right:6px;
    width:30px; height:30px; border-radius:50%;
    background:rgba(0,0,0,.65); backdrop-filter:blur(4px);
    color:#cfcfd6; display:flex; align-items:center; justify-content:center;
    z-index:2; transition:all .15s; opacity:0;
  }
  .card:hover .fav-btn, .fav-btn.active { opacity:1 }
  .fav-btn:hover { background:rgba(0,0,0,.85); transform:scale(1.08) }
  .fav-btn.active { color:var(--gold); background:rgba(20,15,5,.85) }
  .fav-btn svg { width:15px; height:15px }
  .card-body { padding:11px 13px 13px 13px; display:flex; flex-direction:column; gap:6px; flex:1 }
  .card-title {
    font-size:13px; line-height:1.45; color:var(--text-1); font-weight:500;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card-meta {
    margin-top:auto; color:var(--text-3); font-size:11.5px;
    display:flex; align-items:center; gap:10px; font-variant-numeric:tabular-nums;
  }
  .card-meta .views::before { content:"👁"; margin-right:4px; opacity:.7 }
  .card-cats { display:flex; gap:4px; flex-wrap:wrap; margin-top:2px }
  .card-cats .tag {
    font-size:10.5px; padding:1.5px 6px; border-radius:4px;
    background:rgba(110,140,255,.1); color:#aabbff;
    border:1px solid rgba(110,140,255,.18);
  }

  .empty { padding:60px 30px; text-align:center; color:var(--text-3) }
  .empty h3 { color:var(--text-2); font-size:15px; margin-bottom:6px }

  /* Login modal */
  .modal-wrap {
    position:fixed; inset:0; z-index:50;
    background:rgba(5,5,7,.78);
    backdrop-filter:blur(8px);
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .modal-wrap.show { display:flex }
  .modal {
    width:100%; max-width:380px;
    background:var(--bg-1); border:1px solid var(--border);
    border-radius:18px; padding:28px 26px;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
    color:var(--text-1);
  }
  .modal h2 { font-size:20px; margin-bottom:6px; letter-spacing:-0.01em }
  .modal p.sub { color:var(--text-3); font-size:13px; margin-bottom:22px }
  .modal label { display:block; font-size:11.5px; color:var(--text-3); margin-bottom:6px; font-weight:600; letter-spacing:.02em; text-transform:uppercase }
  .modal input[type=text], .modal input[type=password] {
    width:100%; height:42px; padding:0 14px;
    background:var(--bg-2); border:1px solid var(--border);
    color:var(--text-1); border-radius:10px;
    font-size:14px; outline:none; transition:all .15s;
    margin-bottom:14px;
  }
  .modal input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft) }
  .modal .btn-primary {
    width:100%; height:44px; border-radius:10px;
    background:linear-gradient(135deg,var(--accent),#ff8a5d);
    color:#fff; font-size:14px; font-weight:700;
    transition:opacity .15s;
  }
  .modal .btn-primary:hover { opacity:.92 }
  .modal .btn-primary:disabled { opacity:.5; cursor:not-allowed }
  .modal .alt {
    width:100%; height:38px; margin-top:10px;
    border-radius:10px; background:var(--bg-2); border:1px solid var(--border);
    color:var(--text-2); font-size:13px;
  }
  .modal .alt:hover { color:var(--text-1); background:var(--bg-3) }
  .modal .err { color:#ff8a8a; font-size:12.5px; margin-top:6px; min-height:18px }
  .modal .help { font-size:11.5px; color:var(--text-3); margin-top:14px; text-align:center }

  /* Mobile */
  .menu-toggle { display:none }
  @media (max-width: 900px) {
    .app { grid-template-columns:1fr; grid-template-areas:"header" "main" }
    .sidebar {
      position:fixed; top:var(--header-h); left:0;
      width:280px; height:calc(100vh - var(--header-h));
      transform:translateX(-100%); transition:transform .25s; z-index:25;
    }
    .sidebar.open { transform:translateX(0) }
    .menu-toggle { display:inline-flex }
    .search { max-width:100% }
    .player-wrap { padding:16px }
    .list-wrap { padding:14px 16px 60px 16px }
    .header { padding:0 12px; gap:10px }
    .sort-wrap { display:none }
    .auth-chip span.lbl { display:none }
  }
  .icon-btn {
    width:36px; height:36px; display:inline-flex; align-items:center; justify-content:center;
    border-radius:8px; background:var(--bg-2); border:1px solid var(--border);
    color:var(--text-2); transition:all .15s;
  }
  .icon-btn:hover { color:var(--text-1); background:var(--bg-3) }
  .scrim { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:24 }
  .scrim.show { display:block }

  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--bg-3); border:1px solid var(--border);
    color:var(--text-1); padding:10px 18px; border-radius:999px;
    font-size:13px; font-weight:500;
    box-shadow:0 8px 24px rgba(0,0,0,.5);
    z-index:60; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(-4px) }
</style>
</head>
<body>
  <div class="app">
    <header class="header">
      <button class="icon-btn menu-toggle" id="menuBtn" aria-label="메뉴">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="brand">
        <span class="dot">S</span>
        <span>SinghTUBE</span>
        <span class="sub">· @DrVinayKumarSingh</span>
      </div>
      <div class="search">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" type="search" placeholder="제목, 영상 번호, 키워드로 검색…" />
      </div>
      <div class="sort-wrap">
        <button class="sort-btn active" data-sort="num-asc">번호↑</button>
        <button class="sort-btn" data-sort="num-desc">번호↓</button>
        <button class="sort-btn" data-sort="views-desc">조회순</button>
      </div>
      <button class="auth-chip offline" id="authChip" title="로그인">
        <span class="av" id="avInit">?</span>
        <span class="lbl" id="authLabel">로그인</span>
        <span class="sync-dot" id="syncDot"></span>
      </button>
    </header>
    <aside class="sidebar" id="sidebar">
      <div class="nav-item special active" data-topic="__all__">
        <span>📺  전체 영상</span>
        <span class="nav-count" id="allCount">0</span>
      </div>
      <div class="nav-item special fav" data-topic="__fav__">
        <span>⭐  즐겨찾기</span>
        <span class="nav-count" id="favCount">0</span>
      </div>
      <div class="nav-item special watched" data-topic="__watched__">
        <span>👁  시청한 영상</span>
        <span class="nav-count" id="watchedCount">0</span>
      </div>
      <div class="nav-item special" data-topic="__unwatched__">
        <span>🆕  안 본 영상</span>
        <span class="nav-count" id="unwatchedCount">0</span>
      </div>
      <div class="divider"></div>
      <div id="navGroups"></div>
    </aside>
    <main class="main">
      <section class="list-wrap">
        <div class="list-head">
          <div class="list-title" id="listTitle">전체 영상</div>
          <div class="list-count" id="listCount"></div>
        </div>
        <div class="list" id="list"></div>
        <div class="empty" id="empty" style="display:none;">
          <h3>표시할 영상이 없습니다</h3>
          <p id="emptyMsg">다른 카테고리나 검색어를 시도해보세요.</p>
        </div>
      </section>
    </main>
    <div class="scrim" id="scrim"></div>
  </div>

  <!-- Login Modal -->
  <div class="modal-wrap" id="modalWrap">
    <div class="modal">
      <h2>SinghTUBE 로그인 🩺</h2>
      <p class="sub">강찬TUBE와 동일한 계정 사용 가능 — 즐겨찾기와 시청 기록을 다른 기기에서도 동기화합니다.</p>

 Waist Fracture","duration":151.0,"views":0,"num":1,"kind":"main","clean":"\"Percutaneous Screw Fixation\" for Scaphoid Waist Fracture","cats":["hand_fx","wrist_lig"]}],"meta":{"channel":"@DrVinayKumarSingh","channel_url":"https://www.youtube.com/@DrVinayKumarSingh","count":246}}</script>
  <script>
  (function(){
    const FIREBASE_CONFIG = {"apiKey": "AIzaSyD5zH9YzZuZ90vgJqZUC-y2MefJ5Iqnji4", "authDomain": "eliteforce-97939.firebaseapp.com", "projectId": "eliteforce-97939", "storageBucket": "eliteforce-97939.firebasestorage.app", "messagingSenderId": "628068933819", "appId": "1:628068933819:web:0f423a2995d47256bc899e", "measurementId": "G-D8QWPPY4ZW"};
    const AUTH_DOMAIN_SUFFIX = '@kangtube.app';   // shared with 강찬TUBE — same login works on both sites

    const DATA = JSON.parse(document.getElementById('data').textContent);
    const TOPICS = DATA.topics;
    const TOPIC_BY_ID = Object.fromEntries(TOPICS.map(t => [t.id, t]));
    const VIDEOS = DATA.videos;

    let state = {
      topic: '__all__',
      sort: 'num-asc',
      query: '',
      playing: null,
      mode: 'offline',          // 'firebase' | 'offline'
      uid: null,
      favorites: new Set(),
      watched: new Set(),
      ready: false,
    };

    // ----- Firebase init -----
    let fb = null, auth = null, db = null, userDocRef = null, unsubDoc = null;
    try {
      fb = firebase.initializeApp(FIREBASE_CONFIG);
      auth = firebase.auth();
      db = firebase.firestore();
      auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    } catch(e) { console.warn('Firebase init failed', e); }

    const $ = (s, p=document) => p.querySelector(s);
    const el = (tag, attrs={}, children=[]) => {
      const e = document.createElement(tag);
      for (const k in attrs) {
        if (k === 'class') e.className = attrs[k];
        else if (k === 'html') e.innerHTML = attrs[k];
        else e.setAttribute(k, attrs[k]);
      }
      (Array.isArray(children) ? children : [children]).forEach(c => {
        if (c == null) return;
        if (typeof c === 'string') e.appendChild(document.createTextNode(c));
        else e.appendChild(c);
      });
      return e;
    };

    function fmtDuration(sec) {
      sec = Math.round(sec || 0);
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return `${m}:${String(s).padStart(2,'0')}`;
    }
    function fmtViews(n) {
      if (n >= 10000) return (n/10000).toFixed(1).replace(/\.0$/,'') + '만';
      if (n >= 1000)  return (n/1000).toFixed(1).replace(/\.0$/,'') + '천';
      return String(n||0);
    }
    function thumb(id) { return `https://i.ytimg.com/vi/${id}/mqdefault.jpg` }

    function showToast(msg, ms=1500) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(()=>t.classList.remove('show'), ms);
    }

    // ----- Storage (offline) -----
    const LS_FAV = 'singhtube_favorites_v1';
    const LS_WATCH = 'singhtube_watched_v1';
    const LS_MODE = 'singhtube_mode_v1';
    function loadLocal() {
      try { state.favorites = new Set(JSON.parse(localStorage.getItem(LS_FAV) || '[]')); } catch(e) { state.favorites = new Set(); }
      try { state.watched = new Set(JSON.parse(localStorage.getItem(LS_WATCH) || '[]')); } catch(e) { state.watched = new Set(); }
    }
    function saveLocal() {
      localStorage.setItem(LS_FAV, JSON.stringify([...state.favorites]));
      localStorage.setItem(LS_WATCH, JSON.stringify([...state.watched]));
    }

    // ----- Sync state to Firestore (debounced) -----
    let saveTimer = null;
    function setSyncStatus(s) { // 'online' | 'syncing' | 'offline'
      const chip = document.getElementById('authChip');
      chip.classList.remove('online','syncing','offline');
      chip.classList.add(s);
    }
    function pushRemote() {
      if (state.mode !== 'firebase' || !userDocRef) return;
      setSyncStatus('syncing');
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        userDocRef.set({
          favorites: [...state.favorites],
          watched: [...state.watched],
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true }).then(() => {
          setSyncStatus('online');
        }).catch(err => {
          console.error(err);
          setSyncStatus('offline');
          showToast('동기화 실패: ' + err.code);
        });
      }, 350);
    }

    function applyRemoteSnapshot(snap) {
      const d = snap && snap.data ? snap.data() : null;
      if (!d) return;
      if (Array.isArray(d.favorites)) state.favorites = new Set(d.favorites);
      if (Array.isArray(d.watched))   state.watched   = new Set(d.watched);
      saveLocal();
      render();
      updateCounts();
    }

    // ----- Auth flow -----
    function showLogin(show) {
      document.getElementById('modalWrap').classList.toggle('show', !!show);
    }
    function emailFromId(idStr) {
      let id = (idStr||'').trim();
      if (!id) return '';
      if (id.includes('@')) return id;
      return id + AUTH_DOMAIN_SUFFIX;
    }

    async function signInOrUp(idStr, pw) {
      const email = emailFromId(idStr);
      if (!email || !pw) throw new Error('아이디/비밀번호를 입력하세요');
      try {
        return await auth.signInWithEmailAndPassword(email, pw);
      } catch (e) {
        if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential' ||
            e.code === 'auth/invalid-login-credentials') {
          // Try to create
          try {
            const cred = await auth.createUserWithEmailAndPassword(email, pw);
            return cred;
          } catch (ce) {
            // If it was actually a wrong password (user exists), surface that
            if (ce.code === 'auth/email-already-in-use') {
              throw new Error('비밀번호가 일치하지 않습니다');
            }
            throw ce;
          }
        }
        throw e;
      }
    }

    auth && auth.onAuthStateChanged(user => {
      if (user) {
        state.mode = 'firebase';
        state.uid = user.uid;
        localStorage.setItem(LS_MODE, 'firebase');
        const init = (user.email || '?').charAt(0).toUpperCase();
        document.getElementById('avInit').textContent = init;
        document.getElementById('authLabel').textContent = (user.email || '').split('@')[0];
        document.getElementById('authChip').classList.add('online');
        setSyncStatus('online');
        // Listen to user doc
        userDocRef = db.collection('singhtubeFavorites').doc(user.uid);
        if (unsubDoc) unsubDoc();
        unsubDoc = userDocRef.onSnapshot(applyRemoteSnapshot, err => {
          console.error(err);
          setSyncStatus('offline');
        });
        // Initial fetch — if doc doesn't exist yet, push current local state
        userDocRef.get().then(snap => {
          if (!snap.exists) {
            pushRemote();
          } else {
            applyRemoteSnapshot(snap);
          }
        });
        showLogin(false);
      } else {
        state.mode = 'offline';
        state.uid = null;
        if (unsubDoc) { unsubDoc(); unsubDoc = null; }
        userDocRef = null;
        document.getElementById('avInit').textContent = '?';
        document.getElementById('authLabel').textContent = '로그인';
        const chip = document.getElementById('authChip');
        chip.classList.remove('online');
        setSyncStatus('offline');
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('lid').value.trim();
      const pw = document.getElementById('lpw').value;
      const err = document.getElementById('loginErr');
      const btn = document.getElementById('loginBtn');
      err.textContent = '';
      btn.disabled = true;
      btn.textContent = '처리 중…';
      try {
        await signInOrUp(id, pw);
        showToast('환영합니다, ' + id + '님');
      } catch (ex) {
        err.textContent = (ex.message || '오류가 발생했습니다 (' + (ex.code||'') + ')');
      } finally {
        btn.disabled = false;
        btn.textContent = '로그인 / 회원가입';
      }
    });
    document.getElementById('offlineBtn').addEventListener('click', () => {
      localStorage.setItem(LS_MODE, 'offline');
      showLogin(false);
      showToast('오프라인 모드 — 이 기기에만 저장됩니다');
    });

    document.getElementById('authChip').addEventListener('click', () => {
      if (state.mode === 'firebase') {
        if (confirm('로그아웃 하시겠습니까?')) {
          auth.signOut();
          showToast('로그아웃 되었습니다');
        }
      } else {
        showLogin(true);
      }
    });

    // ----- Favorite / Watched logic -----
    function toggleFav(vid, ev) {
      if (ev) { ev.stopPropagation(); ev.preventDefault(); }
      if (state.favorites.has(vid)) state.favorites.delete(vid);
      else state.favorites.add(vid);
      saveLocal();
      pushRemote();
      // Update DOM in place
      document.querySelectorAll(`.card[data-id="${vid}"]`).forEach(c => {
        const btn = c.querySelector('.fav-btn');
        if (state.favorites.has(vid)) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      // If current player is showing this one, update meta
      if (state.playing === vid) updatePlayerMeta();
      updateCounts();
      // If filtered to favorites and unfavoriting, re-render
      if (state.topic === '__fav__') render();
    }
    function markWatched(vid) {
      if (!state.watched.has(vid)) {
        state.watched.add(vid);
        saveLocal();
        pushRemote();
        document.querySelectorAll(`.card[data-id="${vid}"]`).forEach(c => c.classList.add('is-watched'));
        updateCounts();
      }
    }
    function unmarkWatched(vid) {
      if (state.watched.has(vid)) {
        state.watched.delete(vid);
        saveLocal();
        pushRemote();
        document.querySelectorAll(`.card[data-id="${vid}"]`).forEach(c => c.classList.remove('is-watched'));
        updateCounts();
        if (state.topic === '__watched__') render();
      }
    }

    // ----- Sidebar -----
    function buildSidebar() {
      const root = document.getElementById('navGroups');
      root.innerHTML = '';
      DATA.groups.forEach(g => {
        const wrap = el('div', {class: 'group'}, [
          el('div', {class: 'group-header'}, [
            el('svg', {class: 'chev', viewBox: '0 0 16 16', fill: 'currentColor', html: '<path d="M3.5 5.5 8 10l4.5-4.5"/>'}),
            g.name,
          ]),
          el('div', {class: 'group-body'}),
        ]);
        const body = wrap.querySelector('.group-body');
        g.topics.forEach(t => {
          const item = el('div', {class: 'nav-item', 'data-topic': t.id}, [
            el('span', {}, t.kr),
            el('span', {class: 'nav-count'}, String(t.count)),
          ]);
          body.appendChild(item);
        });
        wrap.querySelector('.group-header').addEventListener('click', () => {
          wrap.classList.toggle('collapsed');
        });
        root.appendChild(wrap);
      });

      document.getElementById('sidebar').addEventListener('click', (e) => {
        const item = e.target.closest('.nav-item');
        if (!item) return;
        state.topic = item.dataset.topic;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('scrim').classList.remove('show');
        render();
      });
    }

    function applyFilter() {
      let arr = VIDEOS.slice();
      if (state.topic === '__fav__') arr = arr.filter(v => state.favorites.has(v.id));
      else if (state.topic === '__watched__') arr = arr.filter(v => state.watched.has(v.id));
      else if (state.topic === '__unwatched__') arr = arr.filter(v => !state.watched.has(v.id));
      else if (state.topic !== '__all__') arr = arr.filter(v => v.cats.includes(state.topic));

      if (state.query) {
        const q = state.query.toLowerCase();
        arr = arr.filter(v => v.title.toLowerCase().includes(q) || (v.num != null && String(v.num).includes(q)));
      }
      if (state.sort === 'num-asc') {
        arr.sort((a,b) => ((a.num==null?1e9:a.num) - (b.num==null?1e9:b.num)));
      } else if (state.sort === 'num-desc') {
        arr.sort((a,b) => ((b.num==null?-1:b.num) - (a.num==null?-1:a.num)));
      } else if (state.sort === 'views-desc') {
        arr.sort((a,b) => (b.views||0) - (a.views||0));
      }
      return arr;
    }

    function topicLabel() {
      switch (state.topic) {
        case '__all__': return { kr:'전체 영상', en:'All videos', icon:'📺' };
        case '__fav__': return { kr:'즐겨찾기', en:'Favorites', icon:'⭐' };
        case '__watched__': return { kr:'시청한 영상', en:'Watched', icon:'👁' };
        case '__unwatched__': return { kr:'안 본 영상', en:'Unwatched', icon:'🆕' };
      }
      const t = TOPIC_BY_ID[state.topic];
      return t ? { kr: t.kr, en: t.en, icon: '' } : { kr:'전체 영상', en:'', icon:'📺' };
    }

    function render() {
      const arr = applyFilter();
      const list = document.getElementById('list');
      list.innerHTML = '';
      const empty = document.getElementById('empty');
      empty.style.display = arr.length === 0 ? '' : 'none';
      if (arr.length === 0) {
        let msg = '다른 카테고리나 검색어를 시도해보세요.';
        if (state.topic === '__fav__') msg = '아직 즐겨찾기한 영상이 없습니다. 카드 우상단의 ★ 버튼으로 추가해보세요.';
        else if (state.topic === '__watched__') msg = '아직 시청한 영상이 없습니다.';
        document.getElementById('emptyMsg').textContent = msg;
      }

      const tl = topicLabel();
      const titleEl = document.getElementById('listTitle');
      titleEl.innerHTML = '';
      if (tl.icon) titleEl.appendChild(el('span', {class:'icon'}, tl.icon));
      titleEl.appendChild(document.createTextNode(' ' + tl.kr));
      if (tl.en) titleEl.appendChild(el('span', {class: 'topic-en'}, tl.en));
      document.getElementById('listCount').textContent = `${arr.length}개`;

      const frag = document.createDocumentFragment();
      arr.forEach(v => frag.appendChild(makeCard(v)));
      list.appendChild(frag);
    }

    function makeCard(v) {
      const isFav = state.favorites.has(v.id);
      const isWatched = state.watched.has(v.id);
      const cls = ['card'];
      if (state.playing === v.id) cls.push('playing');
      if (isWatched) cls.push('is-watched');
      const card = el('div', {class: cls.join(' '), 'data-id': v.id});

      const thumbWrap = el('div', {class: 'thumb'}, [
        el('img', {loading: 'lazy', src: thumb(v.id), alt: ''}),
      ]);
      if (v.num != null) {
        const prefix = v.kind === 'special' ? 'S' : '#';
        thumbWrap.appendChild(el('div', {class: 'num-badge'}, prefix + v.num));
      }
      if (v.duration > 0) {
        thumbWrap.appendChild(el('div', {class: 'duration'}, fmtDuration(v.duration)));
      }
      thumbWrap.appendChild(el('div', {class:'watched-mark'}, '✓ 시청'));

      const favBtn = el('button', {class: 'fav-btn' + (isFav ? ' active' : ''), title: isFav ? '즐겨찾기 해제' : '즐겨찾기 추가'});
      favBtn.innerHTML = isFav
        ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"><path d="M12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61z"/></svg>';
      favBtn.addEventListener('click', (e) => toggleFav(v.id, e));
      thumbWrap.appendChild(favBtn);

      card.appendChild(thumbWrap);

      const body = el('div', {class: 'card-body'}, [
        el('div', {class: 'card-title'}, v.clean || v.title),
      ]);
      if (v.cats && v.cats.length) {
        const tagsWrap = el('div', {class: 'card-cats'});
        v.cats.slice(0, 2).forEach(cid => {
          const t = TOPIC_BY_ID[cid];
          if (t) tagsWrap.appendChild(el('span', {class: 'tag'}, t.kr));
        });
        body.appendChild(tagsWrap);
      }
      const meta = el('div', {class: 'card-meta'}, [
        el('span', {class: 'views'}, fmtViews(v.views || 0) + '회'),
      ]);
      body.appendChild(meta);
      card.appendChild(body);
      card.addEventListener('click', () => playVideo(v));
      return card;
    }

    function updatePlayerMeta() { /* no-op: player removed */ }
    function playVideo(v) {
      // Mark watched immediately and open the video on YouTube in a new tab
      markWatched(v.id);
      const url = `https://www.youtube.com/watch?v=${v.id}`;
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    function updateCounts() {
      document.getElementById('totalCount') && (document.getElementById('totalCount').textContent = VIDEOS.length);
      document.getElementById('allCount').textContent = VIDEOS.length;
      document.getElementById('favCount').textContent = state.favorites.size;
      document.getElementById('watchedCount').textContent = state.watched.size;
      document.getElementById('unwatchedCount').textContent = VIDEOS.length - state.watched.size;
    }

    /* events */
    document.getElementById('searchInput').addEventListener('input', (e) => {
      state.query = e.target.value.trim(); render();
    });
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.sort = btn.dataset.sort;
        render();
      });
    });
    document.getElementById('menuBtn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('scrim').classList.toggle('show');
    });
    document.getElementById('scrim').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('scrim').classList.remove('show');
    });

    // bootstrap
    loadLocal();
    buildSidebar();
    updateCounts();
    render();

    // Decide initial mode/login
    const remembered = localStorage.getItem(LS_MODE);
    // If previously chose offline, don't show login. If never chose, show login.
    if (!auth) {
      // No firebase available — silent offline mode
      state.mode = 'offline';
      setSyncStatus('offline');
    } else if (remembered === 'offline' && !auth.currentUser) {
      state.mode = 'offline';
      setSyncStatus('offline');
    } else if (!auth.currentUser) {
      // Wait briefly to see if onAuthStateChanged restores a session, otherwise show login
      setTimeout(() => {
        if (state.mode !== 'firebase') showLogin(true);
      }, 600);
    }
  })();
  </script>
</body>
</html>
